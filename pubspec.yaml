name: gym_tracker
description: App de seguimiento de entrenamiento en el gimnasio.
version: 1.3.0+6

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path: ^1.9.0
  fl_chart: ^0.69.0
  intl: ^0.19.0
  path_provider: ^2.1.4
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_GymT.png"
  adaptive_icon_background: "#050511"
  adaptive_icon_foreground: "assets/images/logo_GymT.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#050511"
  image: assets/images/logo_splash.png
  color_dark: "#050511"
  image_dark: assets/images/logo_splash.png
  android_12:
    color: "#050511"
    image: assets/images/logo_splash.png
    color_dark: "#050511"
    image_dark: assets/images/logo_splash.png
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
